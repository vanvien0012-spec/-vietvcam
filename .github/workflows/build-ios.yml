name: Build VietVCam iOS

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "ios/**"
      - "scripts/build_sileo_repo.sh"
      - ".github/workflows/build-ios.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  THEOS: ${{ github.workspace }}/theos

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}/sdks/iPhoneOS16.5.sdk
          key: sdk-iphoneos16.5-v1

      - name: Download iOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${THEOS}/sdks"
          curl -fL -o sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xJf sdk.tar.xz -C "${THEOS}/sdks"
          rm -f sdk.tar.xz

      - name: Install build tools
        run: brew install ldid

      - name: Build iOS package
        working-directory: ios
        run: |
          make clean package FINALPACKAGE=1 SYSROOT="${THEOS}/sdks/iPhoneOS16.5.sdk"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: vietvcam-ios-deb
          path: ios/packages/*.deb
          if-no-files-found: error

  build-sileo-repo:
    needs: build-ios
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download iOS package
        uses: actions/download-artifact@v4
        with:
          name: vietvcam-ios-deb
          path: dist/

      - name: Install repo tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build Sileo repository
        run: |
          chmod +x scripts/build_sileo_repo.sh
          sed -i 's/\r$//' scripts/build_sileo_repo.sh
          ./scripts/build_sileo_repo.sh

      - name: Upload Sileo repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: vietvcam-sileo-repo
          path: repo-sileo/
